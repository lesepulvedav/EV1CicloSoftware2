name: "Template - Deploy to EKS v1.3.0"
on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
        description: "Namespace de Kubernetes para el despliegue (ej. dev, prod)"
      deployment-name:
        required: true
        type: string
        description: "Nombre del deployment en el clúster EKS"
      image-name:
        required: true
        type: string
        description: "Nombre del repositorio Docker en ECR"
      tag:
        required: true
        type: string
        description: "Etiqueta (tag) de la imagen a desplegar"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true
      AWS_REGION:
        required: true
      EKS_CLUSTER_NAME:
        required: true

jobs:
  deploy:
    name: Despliegue en Kubernetes
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Actualizar Kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Desplegar nueva imagen en EKS
        env:
          # Usamos la cuenta descubierta en el paso anterior
          REGISTRY: ${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          IMAGE_NAME: ${{ inputs.image-name }}
          TAG: ${{ inputs.tag }}
        run: |
          kubectl set image deployment/${{ inputs.deployment-name }} \
          *=$REGISTRY/$IMAGE_NAME:$TAG -n ${{ inputs.namespace }}
