name: "Pipeline Principal - TechMarket App"

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  fase_pruebas_techmarket:
    uses: ./.github/workflows/template_test.yml
    with:
      node-version: '20.x' 

  fase_construccion_techmarket:
    needs: fase_pruebas_techmarket 
    uses: ./.github/workflows/template_build.yml
    with:
      image-name: 'techmarket-core-service-lslv' 
      tag: ${{ github.sha }} 
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

  fase_despliegue_techmarket:
    needs: fase_construccion_techmarket
    uses: ./.github/workflows/template_deploy.yml
    with:
      namespace: 'pruebaslslv' 
      deployment-name: 'techmarket-deployment'
      image-name: 'techmarket-core-service-lslv'
      tag: ${{ github.sha }} 
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
