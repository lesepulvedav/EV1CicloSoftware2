name: "Pipeline Principal - TechMarket App v1.8.0"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fase_pruebas_techmarket:
    uses: ./.github/workflows/template_test.yml
    with:
      node-version: '20.x' 

  fase_construccion_techmarket:
    needs: fase_pruebas_techmarket 
    uses: ./.github/workflows/template_build.yml
    with:
      image-name: 'techmarket-core-service' 
      tag: ${{ github.sha }} 
      AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ vars.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ vars.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}

  fase_despliegue_techmarket:
    needs: fase_construccion_techmarket
    uses: ./.github/workflows/template_deploy.yml
    with:
      namespace: 'staging' 
      deployment-name: 'techmarket-deployment'
      image-name: 'techmarket-core-service'
      tag: ${{ github.sha }} 
      AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ vars.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ vars.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
